<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星途LumiPath · AI跨境规划顾问</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a1628;color:#e0e6f0;height:100vh;display:flex;flex-direction:column}
/* Header */
.chat-header{background:#0d1f35;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(212,175,55,0.15);flex-shrink:0}
.chat-avatar{width:44px;height:44px;background:linear-gradient(135deg,#d4af37,#b8941f);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{color:#fff;font-weight:600;font-size:1rem}
.chat-title{color:#8a9bb5;font-size:.8rem}
.chat-status{display:flex;align-items:center;gap:4px;color:#4ade80;font-size:.75rem}
.chat-status::before{content:'';width:6px;height:6px;background:#4ade80;border-radius:50%}
/* Header buttons */
.header-btns{display:flex;gap:6px;flex-shrink:0}
.share-btn{background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.25);color:#d4af37;font-size:1.2rem;padding:6px 10px;border-radius:8px;cursor:pointer}
.share-btn:hover{background:rgba(212,175,55,0.25)}
.ai-btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#0a1628;border:none;padding:6px 12px;border-radius:8px;font-weight:600;font-size:.8rem;cursor:pointer;white-space:nowrap}
.ai-btn:hover{opacity:.9}
/* Body */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.2);border-radius:2px}
/* Footer */
.chat-footer{padding:12px 16px;border-top:1px solid rgba(212,175,55,0.1);flex-shrink:0}
.quick-actions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.qa-btn{background:rgba(212,175,55,0.1);color:#d4af37;border:1px solid rgba(212,175,55,0.2);padding:6px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.qa-btn:hover,.qa-btn:active{background:rgba(212,175,55,0.2)}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;background:#152040;border:1px solid rgba(212,175,55,0.15);border-radius:8px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none;-webkit-appearance:none}
.chat-input:focus{border-color:#d4af37}
.chat-input::placeholder{color:#5a6d85}
.send-btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#0a1628;border:none;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;transition:opacity .2s;flex-shrink:0}
.send-btn:hover,.send-btn:active{opacity:.9}
/* QR overlay */
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center}
.qr-overlay.active{display:flex}
.qr-card{background:#0d1f35;border:1px solid rgba(212,175,55,0.2);border-radius:16px;padding:32px;text-align:center;max-width:320px;width:90%}
.qr-card h3{color:#fff;margin-bottom:20px;font-size:1.1rem}
.qr-card #qrcode{display:inline-block;background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
.qr-card #qrcode img{display:block;max-width:180px}
.qr-hint{color:#8a9bb5;font-size:.8rem;margin-bottom:16px}
.qr-close-btn{background:rgba(212,175,55,0.15);color:#d4af37;border:1px solid rgba(212,175,55,0.2);padding:8px 24px;border-radius:8px;cursor:pointer;font-size:.85rem}
/* Chat bubbles */
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.9rem;line-height:1.5;animation:fadeIn .3s;white-space:pre-wrap;word-break:break-word}
.msg.bot{background:#152040;color:#e0e6f0;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:rgba(212,175,55,0.15);color:#d4af37;align-self:flex-end;border-bottom-right-radius:4px}
.typing{display:inline-flex;gap:4px}
.typing span{width:6px;height:6px;background:#8a9bb5;border-radius:50%;animation:dot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3}30%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Result card */
.result-card{background:linear-gradient(135deg,rgba(212,175,55,0.1),rgba(212,175,55,0.05));border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:16px;margin-top:4px}
.result-card h4{color:#d4af37;margin-bottom:8px}
.result-card .price{font-size:1.4rem;font-weight:700;color:#fff;margin:8px 0}
.result-card .cta-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.result-card .cta-main{background:linear-gradient(135deg,#d4af37,#b8941f);color:#0a1628;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:.85rem}
.result-card .cta-sub{background:transparent;color:#d4af37;border:1px solid #d4af37;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.85rem}
.result-card .cta-ai{background:transparent;color:#8a9bb5;border:1px solid rgba(138,155,181,0.3);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.85rem}
/* Mobile */
@media(max-width:480px){
  .chat-body{padding:12px}
  .chat-footer{padding:10px 12px}
  .msg{font-size:.85rem}
  .ai-btn{font-size:.75rem;padding:6px 8px}
}
</style>
</head>
<body>

<div class="chat-header">
  <div class="chat-avatar">🎯</div>
  <div class="chat-info">
    <div class="chat-name">星途 LumiPath 跨境规划顾问</div>
    <div class="chat-title">AI跨境规划顾问 · 6大业务线</div>
  </div>
  <div class="chat-status">在线</div>
  <div class="header-btns">
    <button class="ai-btn" onclick="openAIAdvisor()">AI顾问</button>
    <button class="share-btn" onclick="toggleQR()" title="分享二维码">📱</button>
  </div>
</div>

<div class="qr-overlay" id="qrOverlay" onclick="toggleQR()">
  <div class="qr-card" onclick="event.stopPropagation()">
    <h3>扫码咨询跨境规划顾问</h3>
    <div id="qrcode"></div>
    <p class="qr-hint">扫描二维码，直接对话</p>
    <button class="qr-close-btn" onclick="toggleQR()">关闭</button>
  </div>
</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-footer">
  <div class="quick-actions" id="quickActions">
    <button class="qa-btn" onclick="sendQuick('低龄升学')">🎓 低龄升学</button>
    <button class="qa-btn" onclick="sendQuick('综合留学')">📚 综合留学</button>
    <button class="qa-btn" onclick="sendQuick('出国旅游')">✈️ 出国旅游</button>
    <button class="qa-btn" onclick="sendQuick('AI就业')">🤖 AI就业</button>
    <button class="qa-btn" onclick="sendQuick('出国工作')">🏗️ 出国工作</button>
    <button class="qa-btn" onclick="sendQuick('移民')">🏠 移民</button>
  </div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" class="chat-input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
// === 系统配置 ===
var OPENHEX_URL = 'https://agent.openhex.tech/share/77cbf0929e8ab6034bc6b82ff1c9f3d6';
// 飞书CRM表单链接（待配置，获取后替换）
var CRM_FORM_URL = 'https://ucn37t4f7n7i.feishu.cn/share/base/form/shrcn6FMMriXZPpUYVWgtMEncOR';
var API_ENDPOINT = 'https://chat-api.422941896.workers.dev';
var API_ENABLED = true;
var chatHistory = [];

// === 打开AI顾问 ===
function openAIAdvisor() {
  window.open(OPENHEX_URL, '_blank');
}

// === 打开CRM表单 ===
function openCRMForm() {
  if (CRM_FORM_URL !== 'FEISHU_FORM_URL') {
    window.open(CRM_FORM_URL, '_blank');
  } else {
    // 表单未配置时，引导到AI顾问
    addMsg("正在为您连接AI顾问，请稍候...", "bot");
    setTimeout(function(){ window.open(OPENHEX_URL, '_blank'); }, 800);
  }
}

// === 问卷引擎 ===
var QUIZ = {
  questions: [
    {id:1, text:"你的主要目标是什么？", opts:[
      {label:"为孩子规划低龄升学路径", value:"study"},
      {label:"综合留学申请（本科/硕士）", value:"study-all"},
      {label:"出国旅游/自由行定制", value:"travel"},
      {label:"转行AI行业就业", value:"ai-job"},
      {label:"出国务工赚钱", value:"work"},
      {label:"留学移民/拿绿卡", value:"immigration"}
    ]},
    {id:2, text:"你目前的年龄段？", opts:[
      {label:"18-25岁", value:"18-25"},
      {label:"26-35岁", value:"26-35"},
      {label:"36-43岁", value:"36-43"},
      {label:"43岁以上", value:"43+"}
    ]},
    {id:3, text:"你的预算范围？", opts:[
      {label:"先了解一下，预算有限（千元以内）", value:"low"},
      {label:"愿意投入数千到一两万", value:"mid"},
      {label:"预算充足，追求高效确定性（5万+）", value:"high"}
    ]},
    {id:4, text:"你的时间紧迫程度？", opts:[
      {label:"不着急，先了解比较", value:"relaxed"},
      {label:"有计划，半年到一年内启动", value:"planned"},
      {label:"比较急，想尽快落地", value:"urgent"}
    ]}
  ],
  qIdx: 0,
  answers: {},
  current: function(){ return this.questions[this.qIdx]; },
  isDone: function(){ return this.qIdx >= this.questions.length; },
  answer: function(v){ this.answers[this.current().id] = v; this.qIdx++; },
  reset: function(){ this.qIdx = 0; this.answers = {}; }
};

// === 6大业务线产品矩阵 ===
var PRODUCTS = {
  study: { name:"低龄升学", icon:"🎓", tier:{
    entry:{price:"9.9元",label:"升学路径测评",desc:"评估孩子适配的非应试升学路径，含PSB/SIM跳板方案评估"},
    mid:{price:"299-999元",label:"定制升学方案",desc:"含院校推荐（QS前300）、申请时间线、面试准备指导"},
    high:{price:"3万-15万",label:"全流程升学代办",desc:"从选校到offer到手，PSB/SIM代理合作，中留服认证"}
  }},
  "study-all": { name:"综合留学", icon:"📚", tier:{
    entry:{price:"9.9元",label:"留学适配测评",desc:"评估你的背景匹配的院校层次和国家方向"},
    mid:{price:"299-999元",label:"定制留学方案",desc:"含选校定位、文书框架、申请时间线规划"},
    high:{price:"3万-15万",label:"全流程留学代办",desc:"从选校到签证，澳/英/欧/马多国资源，全程托管"}
  }},
  travel: { name:"跨境旅游", icon:"✈️", tier:{
    entry:{price:"9.9元",label:"旅行偏好测评",desc:"了解你的旅行风格，推荐适配线路"},
    mid:{price:"299-999元",label:"定制行程方案",desc:"含小众线路规划、签证协助、住宿推荐"},
    high:{price:"1万-5万",label:"全流程地接服务",desc:"从签证到机票酒店到当地向导，双向（出境+来华）"}
  }},
  "ai-job": { name:"AI就业", icon:"🤖", tier:{
    entry:{price:"9.9元",label:"AI岗适配测评",desc:"评估你的AI转行潜力和适配岗位方向"},
    mid:{price:"299-999元",label:"定制学习路径",desc:"含技能培训路线、项目实战、简历优化"},
    high:{price:"2999-9999元",label:"就业直通车",desc:"系统培训+实战接单+企业内推，训练你的AI能力实现变现"}
  }},
  work: { name:"出国工作", icon:"🏗️", tier:{
    entry:{price:"9.9元",label:"AI资质测评",desc:"评估你的签证适配度，了解可行路径和收入预期"},
    mid:{price:"299-999元",label:"定制务工方案",desc:"含签证路径、雇主匹配、落地安顿全流程规划"},
    high:{price:"1万-8万",label:"全流程代办",desc:"从材料准备到签证获批+海外落地，43岁以内8年+社保"}
  }},
  immigration: { name:"移民", icon:"🏠", tier:{
    entry:{price:"9.9元",label:"移民资格测评",desc:"评估你的移民条件，了解可行路径和时间线"},
    mid:{price:"299-999元",label:"定制移民方案",desc:"含路径规划、材料清单、时间节点预估"},
    high:{price:"5万-15万+",label:"全流程移民代办",desc:"从EOI递交到签证获批，律师团队全程跟进"}
  }}
};

var quizActive = false;

function addMsg(text, type) {
  var body = document.getElementById("chatBody");
  var div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function addTyping() {
  var body = document.getElementById("chatBody");
  var div = document.createElement("div");
  div.className = "msg bot";
  div.id = "typingIndicator";
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

function classify(answers) {
  var goal = answers[1];
  var budget = answers[3];
  var urgency = answers[4];
  var map = {study:"study","study-all":"study-all",travel:"travel","ai-job":"ai-job",work:"work",immigration:"immigration"};
  var category = map[goal] || "study";
  var tier = "entry";
  if (budget === "mid" && urgency !== "relaxed") tier = "mid";
  if (budget === "high" || urgency === "urgent") tier = "high";
  return {category:category, tier:tier};
}

function addResultCard(category, tier) {
  var prod = PRODUCTS[category];
  var plan = prod.tier[tier];
  var body = document.getElementById("chatBody");
  var div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = '<div class="result-card">'+
    '<h4>'+prod.icon+' '+prod.name+' · '+plan.label+'</h4>'+
    '<p>'+plan.desc+'</p>'+
    '<div class="price">'+plan.price+'</div>'+
    '<div class="cta-row">'+
      '<button class="cta-main" onclick="startPurchase(\''+category+'\',\''+tier+'\')">立即咨询登记</button>'+
      '<button class="cta-sub" onclick="openCRMForm()">填写表单</button>'+
      '<button class="cta-ai" onclick="openAIAdvisor()">与AI顾问深聊</button>'+
    '</div></div>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function startQuiz() {
  quizActive = true;
  QUIZ.reset();
  addMsg("好的，我来帮你快速找到最适合的方案。回答几个问题就行：", "bot");
  setTimeout(function(){ askQuestion(); }, 600);
}

function askQuestion() {
  if (QUIZ.isDone()) { finishQuiz(); return; }
  // 动态年龄选项：根据第1题（目标）的答案切换
  if (QUIZ.qIdx === 1) {
    var goal = QUIZ.answers[1];
    if (goal === "study") {
      QUIZ.questions[1].opts = [
        {label:"15-17岁", value:"15-17"},
        {label:"18-22岁", value:"18-22"},
        {label:"23岁以上", value:"23+"}
      ];
    } else {
      QUIZ.questions[1].opts = [
        {label:"18-25岁", value:"18-25"},
        {label:"26-35岁", value:"26-35"},
        {label:"36-43岁", value:"36-43"},
        {label:"43岁以上", value:"43+"}
      ];
    }
  }
  var q = QUIZ.current();
  addMsg(q.text + "\n\n" + q.opts.map(function(o,i){ return (i+1)+". "+o.label; }).join("\n"), "bot");
}

function handleAnswer(input) {
  if (!quizActive) return false;
  var q = QUIZ.current();
  var matched = null;
  var num = parseInt(input);
  if (num >= 1 && num <= q.opts.length) {
    matched = q.opts[num-1].value;
  } else {
    for (var i = 0; i < q.opts.length; i++) {
      if (input.indexOf(q.opts[i].label) >= 0 || input.indexOf(q.opts[i].value) >= 0) {
        matched = q.opts[i].value; break;
      }
    }
  }
  if (!matched) {
    addMsg("请输入选项编号（1-"+q.opts.length+"）来选择，或者告诉我你的具体想法。", "bot");
    return true;
  }
  var label = "";
  for (var i = 0; i < q.opts.length; i++) {
    if (q.opts[i].value === matched) { label = q.opts[i].label; break; }
  }
  addMsg(label, "user");
  QUIZ.answer(matched);
  if (QUIZ.isDone()) { finishQuiz(); }
  else { setTimeout(function(){ askQuestion(); }, 400); }
  return true;
}

function finishQuiz() {
  quizActive = false;
  var result = classify(QUIZ.answers);
  addTyping();
  setTimeout(function(){
    removeTyping();
    var prod = PRODUCTS[result.category];
    addMsg("根据你的情况，你最匹配的是「"+prod.name+"」板块。以下是为你推荐的产品：", "bot");
    addResultCard(result.category, result.tier);
    addMsg("你可以选择「立即咨询登记」填写信息，或点击「与AI顾问深聊」获取更详细的方案。", "bot");
  }, 1200);
}

function startPurchase(category, tier) {
  var prod = PRODUCTS[category];
  var plan = prod.tier[tier];
  addMsg("我要咨询「"+prod.name+" · "+plan.label+"」", "user");
  addMsg("好的！「"+prod.name+" · "+plan.label+"」（"+plan.price+"）\n\n下一步：\n1. 填写咨询登记表单，顾问24小时内联系你\n2. 或直接与AI顾问在线对话，即时获取方案\n\n💡 点击下方按钮选择：", "bot");
  // 弹出选择按钮
  var body = document.getElementById("chatBody");
  var div = document.createElement("div");
  div.className = "msg bot";
  div.innerHTML = '<div class="result-card" style="margin-top:0">'+
    '<div class="cta-row">'+
      '<button class="cta-main" onclick="openCRMForm()">填写咨询表单</button>'+
      '<button class="cta-ai" onclick="openAIAdvisor()">与AI顾问对话</button>'+
    '</div></div>';
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function handleGeneral(input) {
  var lower = input.toLowerCase();
  if (lower.indexOf("低龄")>=0||lower.indexOf("孩子")>=0||lower.indexOf("升学")>=0||lower.indexOf("初中")>=0||lower.indexOf("高中")>=0||lower.indexOf("psb")>=0||lower.indexOf("sim")>=0) {
    addMsg("低龄升学是我们的主力业务线。通过PSB/SIM跳板，低分弯道超车直通QS前25名校（悉尼大学、莫纳什等），费用比直申省50%+，中留服认证。\n\n让我帮你评估一下最合适的路径。", "bot");
    setTimeout(function(){ startQuiz(); }, 500);
    return;
  }
  if (lower.indexOf("综合留学")>=0||lower.indexOf("本科")>=0||lower.indexOf("硕士")>=0||lower.indexOf("博士")>=0||lower.indexOf("申请学校")>=0) {
    addMsg("综合留学覆盖澳/英/欧/马多国，从选校定位到签证获批全程托管。让我帮你评估。", "bot");
    setTimeout(function(){ startQuiz(); }, 500);
    return;
  }
  if (lower.indexOf("工作")>=0||lower.indexOf("打工")>=0||lower.indexOf("务工")>=0) {
    addMsg("出国务工——合法工作签，43岁以内8年+社保可申请。澳洲/英国/欧洲/马来西亚多国资源。", "bot");
    setTimeout(function(){ startQuiz(); }, 500);
    return;
  }
  if (lower.indexOf("移民")>=0||lower.indexOf("绿卡")>=0||lower.indexOf("pr")>=0||lower.indexOf("永居")>=0) {
    addMsg("移民涉及复杂的身份规划，我们有合规路径和律师团队。让我帮你评估。", "bot");
    setTimeout(function(){ startQuiz(); }, 500);
    return;

// === AI API 调用 ===
function callAPI(message) {
  return fetch(API_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: message, history: chatHistory })
  }).then(function(r) {
    if (!r.ok) throw new Error('API error ' + r.status);
    return r.json();
  });
}

function sendMessage() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text) return;
  addMsg(text, "user");
  chatHistory.push({ role: 'user', content: text });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  input.value = "";
  if (quizActive) {
    if (!handleAnswer(text)) { addMsg("请先完成当前测评，或输入选项编号。", "bot"); }
    return;
  }
  if (text.indexOf("测评")>=0||text.indexOf("测试")>=0||text.indexOf("评估")>=0||text.indexOf("帮我")>=0||text.indexOf("推荐")>=0||text.indexOf("适合")>=0) {
    startQuiz(); return;
  }
  addTyping();
  if (API_ENABLED) {
    callAPI(text).then(function(data) {
      removeTyping();
      var reply = data.reply || '';
      addMsg(reply, "bot");
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }).catch(function() {
      removeTyping();
      handleGeneral(text);
    });
  } else {
    setTimeout(function(){ removeTyping(); handleGeneral(text); }, 800);
  }
}

function sendQuick(label) {
  addMsg(label, "user");
  chatHistory.push({ role: 'user', content: label });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  if (quizActive && QUIZ.current()) { handleAnswer(label); return; }
  addTyping();
  if (API_ENABLED) {
    callAPI(label).then(function(data) {
      removeTyping();
      var reply = data.reply || '';
      addMsg(reply, "bot");
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }).catch(function() {
      removeTyping();
      handleGeneral(label);
    });
  } else {
    setTimeout(function(){ removeTyping(); handleGeneral(label); }, 800);
  }
}

// QR code
var qrGenerated = false;
function toggleQR() {
  var overlay = document.getElementById("qrOverlay");
  overlay.classList.toggle("active");
  if (!qrGenerated && overlay.classList.contains("active")) {
    var url = window.location.href;
    if (url.indexOf("file://") === 0) {
      document.getElementById("qrcode").innerHTML = '<p style="color:#0a1628;padding:20px;font-size:.85rem">请先部署到线上<br>再生成二维码</p>';
    } else {
      new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 180,
        height: 180,
        colorDark: "#0a1628",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }
    qrGenerated = true;
  }
}
