<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>星途LumiPath · AI跨境规划顾问</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a1628;color:#e0e6f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.chat-header{background:#0d1f35;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(212,175,55,0.15);flex-shrink:0}
.chat-logo{width:32px;height:32px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#d4af37}
.chat-logo img{width:100%;height:100%;object-fit:cover}
.chat-info{flex:1;min-width:0}
.chat-name{color:#fff;font-weight:600;font-size:.92rem}
.chat-title{color:#8a9bb5;font-size:.72rem}
.chat-status{display:flex;align-items:center;gap:4px;color:#4ade80;font-size:.7rem;flex-shrink:0}
.chat-status::before{content:'';width:6px;height:6px;background:#4ade80;border-radius:50%}
.chat-iframe-wrap{flex:1;position:relative;overflow:hidden}
.chat-iframe-wrap iframe{width:100%;height:100%;border:none;display:block}
@media(max-width:480px){
  .chat-header{padding:8px 12px}
  .chat-name{font-size:.85rem}
  .chat-title{font-size:.68rem}
}
</style>
</head>
<body>

<div class="chat-header">
  <div class="chat-logo">
    <img src="https://overseas-consultant.github.io/Yingxi/assets/images/logo-cropped.png" alt="星途" onerror="this.style.display='none'">
  </div>
  <div class="chat-info">
    <div class="chat-name">星途 LumiPath 跨境规划顾问</div>
    <div class="chat-title">AI智能对话 · 7×24小时在线</div>
  </div>
  <div class="chat-status">在线</div>
</div>

<div class="chat-iframe-wrap">
  <iframe src="https://agent.openhex.tech/share/77cbf0929e8ab6034bc6b82ff1c9f3d6" 
    allow="clipboard-write; microphone; camera; encrypted-media; autoplay; fullscreen" 
    allowfullscreen 
    title="AI跨境规划顾问">
  </iframe>
</div>

</body>
</html>
