<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a1628;color:#e0e6f0;height:100vh;display:flex;flex-direction:column}
/* Header */
.chat-header{background:#0d1f35;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(212,175,55,0.15);flex-shrink:0}
.chat-avatar{width:44px;height:44px;background:linear-gradient(135deg,#d4af37,#b8941f);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.chat-info{flex:1;min-width:0}
.chat-name{color:#fff;font-weight:600;font-size:1rem}
.chat-title{color:#8a9bb5;font-size:.8rem}
.chat-status{display:flex;align-items:center;gap:4px;color:#4ade80;font-size:.75rem}
.chat-status::before{content:'';width:6px;height:6px;background:#4ade80;border-radius:50%}
/* Body */
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.chat-body::-webkit-scrollbar{width:4px}
.chat-body::-webkit-scrollbar-thumb{background:rgba(212,175,55,0.2);border-radius:2px}
/* Footer */
.chat-footer{padding:12px 16px;border-top:1px solid rgba(212,175,55,0.1);flex-shrink:0}
.quick-actions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.qa-btn{background:rgba(212,175,55,0.1);color:#d4af37;border:1px solid rgba(212,175,55,0.2);padding:6px 14px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.qa-btn:hover,.qa-btn:active{background:rgba(212,175,55,0.2)}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;background:#152040;border:1px solid rgba(212,175,55,0.15);border-radius:8px;padding:10px 14px;color:#fff;font-size:.9rem;outline:none;-webkit-appearance:none}
.chat-input:focus{border-color:#d4af37}
.chat-input::placeholder{color:#5a6d85}
.send-btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#0a1628;border:none;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;transition:opacity .2s;flex-shrink:0}
.send-btn:hover,.send-btn:active{opacity:.9}
/* Share & QR */
.share-btn{background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.25);color:#d4af37;font-size:1.2rem;padding:6px 10px;border-radius:8px;cursor:pointer;flex-shrink:0}
.share-btn:hover{background:rgba(212,175,55,0.25)}
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;justify-content:center;align-items:center}
.qr-overlay.active{display:flex}
.qr-card{background:#0d1f35;border:1px solid rgba(212,175,55,0.2);border-radius:16px;padding:32px;text-align:center;max-width:320px;width:90%}
.qr-card h3{color:#fff;margin-bottom:20px;font-size:1.1rem}
.qr-card #qrcode{display:inline-block;background:#fff;padding:12px;border-radius:8px;margin-bottom:12px}
.qr-card #qrcode img{display:block;max-width:180px}
.qr-hint{color:#8a9bb5;font-size:.8rem;margin-bottom:16px}
.qr-close-btn{background:rgba(212,175,55,0.15);color:#d4af37;border:1px solid rgba(212,175,55,0.2);padding:8px 24px;border-radius:8px;cursor:pointer;font-size:.85rem}
/* Chat bubbles */
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:.9rem;line-height:1.5;animation:fadeIn .3s;white-space:pre-wrap;word-break:break-word}
.msg.bot{background:#152040;color:#e0e6f0;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:rgba(212,175,55,0.15);color:#d4af37;align-self:flex-end;border-bottom-right-radius:4px}
.typing{display:inline-flex;gap:4px}
.typing span{width:6px;height:6px;background:#8a9bb5;border-radius:50%;animation:dot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{opacity:.3}30%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Result card */
.result-card{background:linear-gradient(135deg,rgba(212,175,55,0.1),rgba(212,175,55,0.05));border:1px solid rgba(212,175,55,0.2);border-radius:12px;padding:16px;margin-top:4px}
.result-card h4{color:#d4af37;margin-bottom:8px}
.result-card .price{font-size:1.4rem;font-weight:700;color:#fff;margin:8px 0}
.result-card .cta-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.result-card .cta-main{background:linear-gradient(135deg,#d4af37,#b8941f);color:#0a1628;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:.85rem}
.result-card .cta-sub{background:transparent;color:#d4af37;border:1px solid #d4af37;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.85rem}
/* Markdown（AI 回复气泡，类名与 @openhex-ai/agent-sdk 的 Markdown 组件一致） */
.msg.md{white-space:normal}
.msg.md .ohx-p{margin:0 0 8px}
.msg.md>:last-child{margin-bottom:0}
.msg.md .ohx-ul,.msg.md .ohx-ol{margin:0 0 8px;padding-left:20px}
.msg.md li{margin:3px 0}
.msg.md .ohx-code{background:rgba(212,175,55,0.12);padding:1px 5px;border-radius:4px;font-size:.85em}
.msg.md .ohx-pre{background:#0d1a30;padding:10px 12px;border-radius:8px;overflow-x:auto;margin:0 0 8px}
.msg.md .ohx-pre code{background:none;padding:0;font-size:.82em}
.msg.md .ohx-h{margin:4px 0 8px;color:#fff;line-height:1.4}
.msg.md .ohx-h1,.msg.md .ohx-h2{font-size:1.05em}
.msg.md .ohx-h3,.msg.md .ohx-h4,.msg.md .ohx-h5,.msg.md .ohx-h6{font-size:.95em}
.msg.md .ohx-quote{border-left:3px solid rgba(212,175,55,0.4);padding-left:10px;margin:0 0 8px;color:#a9b7cf}
.msg.md .ohx-hr{border:none;border-top:1px solid rgba(212,175,55,0.25);margin:8px 0}
.msg.md a{color:#d4af37}
/* Mobile */
@media(max-width:480px){
  .chat-body{padding:12px}
  .chat-footer{padding:10px 12px}
  .msg{font-size:.85rem}
}

// === Markdown 解析与渲染 ===
// 1:1 移植自 @openhex-ai/agent-sdk/react 的 Markdown 组件（官网同款渲染），
// 输出纯 DOM（textContent 构建，无 innerHTML），类名保持 ohx-* 一致。
function ohxMdSanitizeHref(href) {
  var t = href.trim();
  if (/^(https?:|mailto:)/i.test(t)) return t;
  if (/^\/\//.test(t)) return 'https:' + t;
  if (/^www\./i.test(t)) return 'https://' + t;
  return null;
}

var OHX_MD_INLINE = [
  { type: 'code', re: /`([^`]+)`/ },
  { type: 'bold', re: /\*\*([^*]+)\*\*/ },
  { type: 'italic', re: /\*([^*\n]+)\*|_([^_\n]+)_/ },
  { type: 'link', re: /\[([^\]]+)\]\(([^)\s]+)\)/ },
  { type: 'url', re: /(https?:\/\/[^\s<]+[^\s<.,:;"')\]}]|www\.[^\s<]+[^\s<.,:;"')\]}])/ }
];

function ohxMdParseInline(input) {
  var spans = [];
  var rest = input;
  while (rest.length > 0) {
    var best = null;
    for (var r = 0; r < OHX_MD_INLINE.length; r++) {
      var rule = OHX_MD_INLINE[r];
      var m = rule.re.exec(rest);
      if (!m || m.index == null) continue;
      if (best && m.index >= best.index) continue;
      var span = null;
      if (rule.type === 'code') span = { type: 'code', text: m[1] };
      else if (rule.type === 'bold') span = { type: 'bold', text: m[1] };
      else if (rule.type === 'italic') span = { type: 'italic', text: m[1] != null ? m[1] : m[2] };
      else if (rule.type === 'link') {
        var href = ohxMdSanitizeHref(m[2]);
        span = href ? { type: 'link', text: m[1], href: href } : { type: 'text', text: m[0] };
      } else {
        var href2 = ohxMdSanitizeHref(m[1]);
        span = href2 ? { type: 'link', text: m[1], href: href2 } : { type: 'text', text: m[0] };
      }
      if (span) best = { index: m.index, length: m[0].length, span: span };
    }
    if (!best) { spans.push({ type: 'text', text: rest }); break; }
    if (best.index > 0) spans.push({ type: 'text', text: rest.slice(0, best.index) });
    spans.push(best.span);
    rest = rest.slice(best.index + best.length);
  }
  return spans;
}

function ohxMdParse(input) {
  var blocks = [];
  var lines = input.replace(/\r\n/g, '\n').split('\n');
  var i = 0;
  var para = [];
  function flushPara() {
    if (para.length === 0) return;
    var text = para.join('\n').trim();
    if (text) blocks.push({ type: 'paragraph', spans: ohxMdParseInline(text) });
    para = [];
  }
  var LIST_ITEM = /^\s*([-*+]|\d+[.)])\s+(.*)$/;
  while (i < lines.length) {
    var line = lines[i];
    var fence = /^```(.*)$/.exec(line);
    if (fence) {
      flushPara();
      var code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      i++;
      blocks.push({ type: 'code', text: code.join('\n') });
      continue;
    }
    var trimmed = line.trim();
    if (trimmed === '') { flushPara(); i++; continue; }
    if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) { flushPara(); blocks.push({ type: 'hr' }); i++; continue; }
    var heading = /^(#{1,6})\s+(.*?)\s*#*\s*$/.exec(line);
    if (heading) {
      flushPara();
      blocks.push({ type: 'heading', level: heading[1].length, spans: ohxMdParseInline(heading[2]) });
      i++;
      continue;
    }
    if (/^\s*>\s?/.test(line)) {
      flushPara();
      var quote = [];
      while (i < lines.length && /^\s*>\s?/.test(lines[i])) { quote.push(lines[i].replace(/^\s*>\s?/, '')); i++; }
      blocks.push({ type: 'blockquote', spans: ohxMdParseInline(quote.join('\n').trim()) });
      continue;
    }
    var firstItem = LIST_ITEM.exec(line);
    if (firstItem) {
      flushPara();
      var ordered = /\d/.test(firstItem[1]);
      var start = ordered ? (parseInt(firstItem[1], 10) || 1) : 1;
      var items = [];
      while (i < lines.length) {
        var mi = LIST_ITEM.exec(lines[i]);
        if (mi) { items.push(ohxMdParseInline(mi[2])); i++; }
        else if (lines[i].trim() !== '' && /^\s+\S/.test(lines[i]) && items.length > 0) {
          var cont = ohxMdParseInline(' ' + lines[i].trim());
          for (var k = 0; k < cont.length; k++) items[items.length - 1].push(cont[k]);
          i++;
        } else break;
      }
      blocks.push({ type: 'list', ordered: ordered, start: start, items: items });
      continue;
    }
    para.push(line);
    i++;
  }
  flushPara();
  return blocks;
}

function ohxMdRender(container, text) {
  container.textContent = '';
  function spansToFrag(spans) {
    var frag = document.createDocumentFragment();
    spans.forEach(function(s) {
      var el;
      if (s.type === 'code') { el = document.createElement('code'); el.className = 'ohx-code'; el.textContent = s.text; }
      else if (s.type === 'bold') { el = document.createElement('strong'); el.textContent = s.text; }
      else if (s.type === 'italic') { el = document.createElement('em'); el.textContent = s.text; }
      else if (s.type === 'link') {
        el = document.createElement('a');
        el.href = s.href; el.target = '_blank'; el.rel = 'noopener noreferrer nofollow';
        el.textContent = s.text;
      } else { el = document.createTextNode(s.text); }
      frag.appendChild(el);
    });
    return frag;
  }
  ohxMdParse(String(text || '')).forEach(function(b) {
    var el;
    if (b.type === 'code') {
      el = document.createElement('pre'); el.className = 'ohx-pre';
      var c = document.createElement('code'); c.textContent = b.text; el.appendChild(c);
    } else if (b.type === 'heading') {
      var lv = Math.min(6, Math.max(1, b.level));
      el = document.createElement('h' + lv); el.className = 'ohx-h ohx-h' + lv;
      el.appendChild(spansToFrag(b.spans));
    } else if (b.type === 'hr') {
      el = document.createElement('hr'); el.className = 'ohx-hr';
    } else if (b.type === 'blockquote') {
      el = document.createElement('blockquote'); el.className = 'ohx-quote';
      el.appendChild(spansToFrag(b.spans));
    } else if (b.type === 'list') {
      el = document.createElement(b.ordered ? 'ol' : 'ul');
      el.className = b.ordered ? 'ohx-ol' : 'ohx-ul';
      if (b.ordered) el.start = b.start;
      b.items.forEach(function(spans) {
        var li = document.createElement('li');
        li.appendChild(spansToFrag(spans));
        el.appendChild(li);
      });
    } else {
      el = document.createElement('p'); el.className = 'ohx-p';
      el.appendChild(spansToFrag(b.spans));
    }
    container.appendChild(el);
  });
}

function classify(answers) {
  var goal = answers[1];
  var budget = answers[3];
  var urgency = answers[4];
  var map = {work:"work",study:"study",travel:"travel",immigration:"immigration","ai-job":"ai-job"};
  var category = map[goal] || "work";
  var tier = "entry";
  if (budget === "mid" && urgency !== "relaxed") tier = "mid";
  if (budget === "high" || urgency === "urgent") tier = "high";
  return {category:category, tier:tier};
}

function startQuiz() {
  quizActive = true;
  QUIZ.reset();
  addMsg("好的，我来帮你快速找到最适合的方案。回答几个问题就行：", "bot");
  setTimeout(function(){ askQuestion(); }, 600);
}

function askQuestion() {
  if (QUIZ.isDone()) { finishQuiz(); return; }
  // 动态年龄选项：根据第1题（目标）的答案切换
  if (QUIZ.qIdx === 1) {
    var goal = QUIZ.answers[1];
    if (goal === "study") {
      QUIZ.questions[1].opts = [
        {label:"15-17岁", value:"15-17"},
        {label:"18-22岁", value:"18-22"},
        {label:"23岁以上", value:"23+"}
      ];
    } else {
      QUIZ.questions[1].opts = [
        {label:"18-25岁", value:"18-25"},
        {label:"26-35岁", value:"26-35"},
        {label:"36-43岁", value:"36-43"},
        {label:"43岁以上", value:"43+"}
      ];
    }
  }
  var q = QUIZ.current();
  addMsg(q.text + "\n\n" + q.opts.map(function(o,i){ return (i+1)+". "+o.label; }).join("\n"), "bot");
}

function handleAnswer(input) {
  if (!quizActive) return false;
  var q = QUIZ.current();
  var matched = null;
  var num = parseInt(input);
  if (num >= 1 && num <= q.opts.length) {
    matched = q.opts[num-1].value;
  } else {
    for (var i = 0; i < q.opts.length; i++) {
      if (input.indexOf(q.opts[i].label) >= 0 || input.indexOf(q.opts[i].value) >= 0) {
        matched = q.opts[i].value; break;
      }
    }
  }
  if (!matched) {
    addMsg("请输入选项编号（1-"+q.opts.length+"）来选择，或者告诉我你的具体想法。", "bot");
    return true;
  }
  var label = "";
  for (var i = 0; i < q.opts.length; i++) {
    if (q.opts[i].value === matched) { label = q.opts[i].label; break; }
  }
  addMsg(label, "user");
  QUIZ.answer(matched);
  if (QUIZ.isDone()) { finishQuiz(); }
  else { setTimeout(function(){ askQuestion(); }, 400); }
  return true;
}

function finishQuiz() {
  quizActive = false;
  var result = classify(QUIZ.answers);
  addTyping();
  setTimeout(function(){
    removeTyping();
    var prod = PRODUCTS[result.category];
    addMsg("根据你的情况，你最匹配的是「"+prod.name+"」板块。以下是为你推荐的产品：", "bot");

}

// === AI API 调用 ===
// 流程与 @openhex-ai/agent-sdk 的 sendMessage 一致：
// POST /send 后，从 userEventId 处增量读 SSE，收到 raw.type==='result' 即止。
// 注意：/stream 是不会自动关闭的实时流，必须边读边解析，不能等流结束。
async function callAPI(message) {
  var data = await sendToAgent(message);
  conversationId = data.conversationId;
  localStorage.setItem(CONV_KEY, conversationId);

  var reply = await pollTurn(data.conversationId, data.userEventId);
  return { reply: reply || null };
}

// source:'web_embed' 让服务端为每次无 conversationId 的 send 新建会话，
// 而不是复用"该用户+该Agent"的共享会话（webapp/wechat_mp 才复用）。
// 会话归属记在浏览器 localStorage —— 即每个访客一个独立会话。
async function sendToAgent(message) {
  var body = { message: message, source: 'web_embed', senderName: '网站访客' };
  if (conversationId) body.conversationId = conversationId;
  else body.targetAgentIds = [AGENT_ID];

  var r = await fetch(API_BASE + '/api/v2/conversations/send', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + API_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok && body.conversationId && r.status >= 400 && r.status < 500) {
    // 本地存的会话已失效（被删/过期）：丢弃并新开一个
    conversationId = null;
    localStorage.removeItem(CONV_KEY);
    return sendToAgent(message);
  }
  if (!r.ok) throw new Error('API error ' + r.status);
  return r.json();
}

// 轮询 /messages 读取本轮结果。
// 为什么不用 SSE /stream：消费者视图的 SSE 流会隐藏 Agent 侧错误事件
// （如积分不足的 402），出错时流上永远等不到数据；/messages 是全量视图，
// 成功回复和错误都看得到。首条消息要冷启动 Agent pod（可能几十秒），
// 轮询会一直等到本轮出现终止事件或超时。
async function pollTurn(convId, userEventId) {
  var deadline = Date.now() + 300000;
  while (Date.now() < deadline) {
    await new Promise(function(res){ setTimeout(res, 2500); });
    var r = await fetch(API_BASE + '/api/v2/conversations/' + convId + '/messages', {
      headers: { 'Authorization': 'Bearer ' + API_KEY }
    }).catch(function(){ return null; });
    if (!r || !r.ok) continue;
    var data = await r.json().catch(function(){ return null; });
    if (!data || !data.entries) continue;
    var replyParts = [], textParts = [];
    var seenUser = !userEventId; // 没有游标就从头解析
    for (var i = 0; i < data.entries.length; i++) {
      var e = data.entries[i];
      if (!seenUser) {
        if (String(e.id) >= userEventId) seenUser = true; // 从本轮用户消息开始
        else continue;
      }
      var rec = e.data || {};
      rec.id = e.id;
      if (collectRecord(rec, replyParts, textParts)) {
        return pickReply(replyParts, textParts);
      }
    }
  }
  throw new Error('OpenHex: no reply before deadline');
}

// 返回 true 表示本轮结束（收到 result 事件）
function collectRecord(rec, replyParts, textParts) {
  var raw = rec.raw || {};
  if (rec.sender !== 'assistant' && rec.sender !== 'agent') return false;
  if (raw.kind === 'greeting') return false; // 建会话时的打招呼，不算回复
  if (raw.type === 'result') {
    if (raw.is_error || raw.subtype === 'error') {
      throw new Error('OpenHex: ' + (raw.result || raw.errorKind || 'agent error'));
    }
    if (raw.subtype === 'success') return true;
    // 不带 subtype 的裸 result（如 greeting 的终止符）：只有已收到内容才算结束
    return replyParts.length > 0 || textParts.length > 0;
  }
  var msg = raw.message;
  if (msg && typeof msg === 'object' && Array.isArray(msg.content)) {
    msg.content.forEach(function(b) {
      if (b.type === 'tool_use' && String(b.name || '').indexOf('respond_to_user') >= 0 && b.input && b.input.message) {
        replyParts.push(b.input.message);
      } else if (b.type === 'text' && b.text) {
        textParts.push(b.text);
      }
    });
  }
  return false;
}

function pickReply(replyParts, textParts) {
  return replyParts.length ? replyParts.join('\n\n') : textParts.join('');
}

function sendMessage() {
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text) return;
  addMsg(text, "user");
  chatHistory.push({ role: 'user', content: text });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  input.value = "";
  if (quizActive) {
    if (!handleAnswer(text)) { addMsg("请先完成当前测评，或输入选项编号。", "bot"); }
    return;
  }
  if (text.indexOf("测评")>=0||text.indexOf("测试")>=0||text.indexOf("评估")>=0||text.indexOf("帮我")>=0||text.indexOf("推荐")>=0||text.indexOf("适合")>=0) {
    startQuiz(); return;
  }
  addTyping();

  // 尝试调用 AI API，失败则 fallback 到本地关键词匹配
  if (API_ENABLED) {
    callAPI(text).then(function(data) {
      removeTyping();
      var reply = data.reply || '';
      addMsgMd(reply);
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }).catch(function(err) {
      console.warn('[OpenHex] Agent 调用失败，回退本地话术:', err && err.message);
      removeTyping();
      handleGeneral(text);
    });
  } else {
    setTimeout(function(){ removeTyping(); handleGeneral(text); }, 800);
  }
}

function sendQuick(label) {
  addMsg(label, "user");
  chatHistory.push({ role: 'user', content: label });
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
  if (quizActive && QUIZ.current()) { handleAnswer(label); return; }
  addTyping();

  if (API_ENABLED) {
    callAPI(label).then(function(data) {
      removeTyping();
      var reply = data.reply || '';
      addMsgMd(reply);
      chatHistory.push({ role: 'assistant', content: reply });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
    }).catch(function(err) {
      console.warn('[OpenHex] Agent 调用失败，回退本地话术:', err && err.message);
      removeTyping();
      handleGeneral(label);
    });
  } else {
    setTimeout(function(){ removeTyping(); handleGeneral(label); }, 800);
  }
}

// QR code
var qrGenerated = false;
function toggleQR() {
  var overlay = document.getElementById("qrOverlay");
  overlay.classList.toggle("active");
  if (!qrGenerated && overlay.classList.contains("active")) {
    var url = window.location.href;
    // Fallback: if local file, tell user to deploy first
    if (url.indexOf("file://") === 0) {
      document.getElementById("qrcode").innerHTML = '<p style="color:#0a1628;padding:20px;font-size:.85rem">请先部署到线上<br>再生成二维码</p>';
    } else {
      new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 180,
        height: 180,
        colorDark: "#0a1628",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }
    qrGenerated = true;
  }
}
